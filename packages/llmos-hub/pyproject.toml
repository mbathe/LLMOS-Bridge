[tool.poetry]
name = "llmos-hub"
version = "0.1.0"
description = "Lightweight module hub server for LLMOS Bridge — publish, discover, and install community modules"
authors = ["LLMOS Bridge Contributors"]
license = "Apache-2.0"
readme = "README.md"
keywords = ["llm", "agent", "module-hub", "registry"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
packages = [{ include = "llmos_hub" }]

[tool.poetry.dependencies]
python            = "^3.11"
fastapi           = "^0.111"
uvicorn           = { version = "^0.30", extras = ["standard"] }
pydantic          = "^2.7"
pydantic-settings = "^2.3"
aiosqlite         = "^0.20"
structlog         = "^24.1"
typer             = { version = ">=0.12", extras = ["all"] }
rich              = "^13.7"
python-multipart  = ">=0.0.9"

[tool.poetry.group.dev.dependencies]
pytest          = "^8.2"
pytest-asyncio  = "^0.23"
pytest-cov      = "^5.0"
httpx           = "^0.27"
ruff            = "^0.5"

[tool.poetry.scripts]
llmos-hub = "llmos_hub.cli:app"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
