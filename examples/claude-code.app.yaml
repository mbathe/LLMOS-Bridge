# claude-code.app.yaml — Production AI coding assistant
#
# This app replicates and extends Claude Code's capabilities inside LLMOS.
# It is NOT a demo — it is designed to be MORE powerful than standalone Claude Code
# by leveraging the full daemon infrastructure:
#
#   22 modules (260+ actions) vs Claude Code's ~10 built-in tools
#   Full security pipeline (profiles, permissions, scanners, audit)
#   5-level persistent memory (working, conversation, project, episodic, procedural)
#   Sub-agent spawning for parallel work
#   6 trigger types (CLI, HTTP, webhook, schedule, watch, event)
#   Context auto-compression with summarization
#   Full observability (streaming, tracing, metrics)
#
# Usage:
#   llmos app run claude-code.app.yaml                              # Interactive
#   llmos app run claude-code.app.yaml "Fix the bug in auth.py"     # One-shot
#   llmos app run claude-code.app.yaml --mode one-shot "Explain X"  # Explicit one-shot
#
# With daemon running, triggers auto-register:
#   - File watcher: auto-lint on save
#   - Schedule: daily code review at 09:00 UTC
#   - Event: react to module installs, deployments
#   - HTTP: POST /code for CI/CD integration

app:
  name: claude-code
  version: "7.0"
  description: "Production AI coding assistant — full LLMOS daemon power"
  author: llmos
  tags: [coding, assistant, developer-tools, production]
  license: MIT

  max_concurrent_runs: 3
  max_turns_per_run: 200
  max_actions_per_turn: 30
  timeout: "3600s"
  checkpoint: true

  interface:
    input:
      type: string
      description: "Coding task, question, or instruction"
    output:
      type: string
      description: "Result, explanation, or confirmation of changes made"
    errors:
      - code: FILE_NOT_FOUND
        description: "Requested file does not exist"
      - code: PERMISSION_DENIED
        description: "Action blocked by security policy"
      - code: TIMEOUT
        description: "Operation exceeded time limit"
      - code: COMPILATION_ERROR
        description: "Code failed to compile or parse"

# ─── Variables ──────────────────────────────────────────────────────

variables:
  workspace: "{{env.PWD}}"
  shell_timeout: "30s"
  test_timeout: "120s"
  test_command: "pytest"
  lint_command: "ruff check"

# ─── Agent ──────────────────────────────────────────────────────────

agent:
  id: coder
  role: specialist
  brain:
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.2
    max_tokens: 16000
    timeout: 120.0
    config:
      api_key: "{{secret.ANTHROPIC_API_KEY ?? env.ANTHROPIC_API_KEY ?? ''}}"
    fallback:
      - provider: deepseek
        model: deepseek-chat
        max_tokens: 8192
        config:
          api_key: "{{secret.DEEPSEEK_API_KEY ?? env.DEEPSEEK_API_KEY ?? ''}}"
          base_url: "https://api.deepseek.com/v1"

  system_prompt: |
    You are Claude Code, an elite AI coding assistant running inside LLMOS Bridge.
    Your workspace is: {{workspace}}

    ═══ IDENTITY ═══
    You are the most capable coding agent available. You can read, write, search,
    run commands, manage tasks, spawn sub-agents, and persist memory across sessions.
    You replicate and exceed the capabilities of standalone Claude Code.

    ═══ WHEN TO USE TOOLS vs WHEN TO ANSWER ═══
    - Questions, greetings, explanations → answer in text, NO tool calls
    - Tasks requiring action (read/write/run/search) → use tools
    - NEVER use os_exec__run_command to "echo" an answer — just reply in text

    ═══ CORE TOOLS ═══
    File operations:
    - filesystem__read_file: Read file contents (ALWAYS read before editing)
    - filesystem__write_file: Write/create files (use create_dirs=true for new paths)
    - filesystem__list_directory: List directory contents
    - filesystem__search_files: Search files by pattern and content regex
    - filesystem__get_file_info: Get file metadata (size, permissions, dates)
    - filesystem__create_directory: Create directories
    - filesystem__delete_file: Delete files (requires approval)
    - filesystem__move_file: Move/rename files

    Shell:
    - os_exec__run_command: Run shell commands (git, npm, pytest, etc.)
    - os_exec__get_env_var: Read environment variables
    - os_exec__get_system_info: Get system info (cpu, memory, disk, os)

    ═══ TASK MANAGEMENT (CRITICAL) ═══
    You MUST track your work with the built-in todo tool:
    - todo(action="add", task="Description") — add a task
    - todo(action="update", id="...", status="in_progress") — mark as started
    - todo(action="update", id="...", status="completed") — mark as done
    - todo(action="list") — see current tasks

    Rules:
    - For any multi-step task, create a todo list FIRST before starting
    - Mark tasks in_progress BEFORE working on them (one at a time)
    - Mark tasks completed IMMEDIATELY after finishing
    - This is how you demonstrate progress to the user

    ═══ MEMORY (CRITICAL) ═══
    You have persistent memory across sessions. USE IT:
    - memory__store(key, value, backend="kv"): Save important context
    - memory__recall(key, backend="kv"): Retrieve saved context
    - memory__search(query, backend="episodic"): Search past experiences
    - memory__set_objective(objective, priority): Set your current goal
    - memory__observe(observation, category): Record observations
    - memory__update_progress(objective_id, progress, notes): Track progress

    What to remember:
    - Project structure and conventions (after first exploration)
    - Decisions made and their reasoning
    - Errors encountered and how you fixed them
    - User preferences observed during the session
    - Key file paths and their purposes

    At the START of each session:
    1. Recall project context: memory__recall("project_context")
    2. Check for objectives: memory__recall("current_objectives")
    3. Set your objective: memory__set_objective(...)

    ═══ SUB-AGENTS (PARALLEL WORK) ═══
    For independent tasks, spawn sub-agents to work in parallel:
    - agent_spawn__spawn_agent(task, agent_type="worker"): Start a background task
    - agent_spawn__check_agent(agent_id): Check if done
    - agent_spawn__get_result(agent_id): Get the result
    - agent_spawn__list_agents(): See all running agents
    - agent_spawn__wait_agent(agent_id): Wait for completion

    Use sub-agents when:
    - Multiple independent files need to be analyzed
    - Running tests while making changes
    - Researching multiple topics simultaneously

    ═══ CONTEXT AWARENESS ═══
    - context_manager__get_budget(): Check remaining context budget
    - context_manager__get_state(): See context usage breakdown
    - If context is getting full, the system auto-compresses older messages
    - Your objectives and cognitive state are NEVER compressed

    ═══ WORKING RULES ═══
    1. ALWAYS read files before modifying them
    2. ALWAYS create a todo list for multi-step tasks
    3. ALWAYS run tests after making changes (when tests exist)
    4. NEVER modify files outside {{workspace}} without permission
    5. NEVER use destructive git operations without asking
    6. When writing large files, split into manageable chunks
    7. Store important findings in memory for future sessions
    8. Use sub-agents for independent parallel work
    9. Check context budget periodically on long tasks

  loop:
    type: reactive
    max_turns: 200
    stop_conditions:
      - "{{agent.no_tool_calls}}"
    on_tool_error: show_to_agent
    on_llm_error: retry
    retry:
      max_attempts: 3
      backoff: exponential
    context:
      # max_tokens and model_context_window are auto-capped at runtime
      # to the actual model limit — no need to hardcode.
      strategy: summarize
      keep_system_prompt: true
      keep_last_n_messages: 30
      summarize_older: true
      output_reserved: 16000
      cognitive_max_tokens: 1500
      memory_max_tokens: 2000
      compression_trigger_ratio: 0.70
      min_recent_messages: 10
    planning:
      enabled: true
      batch_actions: true
      max_actions_per_batch: 20
      replan_on_failure: true

  tools:
    # ── Filesystem (full access, workspace-sandboxed) ──
    - module: filesystem
      actions: [read_file, write_file, append_file, list_directory, search_files,
                get_file_info, create_directory, delete_file, move_file, copy_file,
                compute_checksum]
      constraints:
        paths: ["{{workspace}}"]
        max_file_size: "50MB"

    # ── Shell (essential commands) ──
    - module: os_exec
      actions: [run_command, get_env_var, get_system_info]
      constraints:
        timeout: "{{shell_timeout}}"
        working_directory: "{{workspace}}"
        forbidden_commands: ["rm -rf /", "dd if=/dev/zero", "mkfs", ":(){:|:&};:"]
        forbidden_patterns: ["sudo rm -rf *", "curl * | bash", "wget * | sh"]
        rate_limit_per_minute: 30

    # ── Memory (full access — critical for persistence) ──
    - module: memory
      actions: [store, recall, search, delete, list_keys,
                set_objective, get_context, update_progress, observe]

    # ── Sub-agent spawning (parallel work) ──
    - module: agent_spawn
      actions: [spawn_agent, check_agent, get_result, list_agents,
                cancel_agent, wait_agent, send_message]

    # ── Context management (budget awareness) ──
    - module: context_manager
      actions: [get_budget, get_state, compress_history, get_tools_summary]

    # ── HTTP API (for external integrations) ──
    - module: api_http
      actions: [http_get, http_post]
      constraints:
        max_response_size: "10MB"
        timeout: "30s"

    # ── Security introspection ──
    - module: security
      actions: [check_permission, get_security_status]

    # ── Module management (inspect only) ──
    - module: module_manager
      actions: [list_modules, get_module_info, get_system_status]

# ─── Memory (5-level) ──────────────────────────────────────────────

memory:
  working:
    max_size: "100MB"
  conversation:
    max_history: 500
    auto_summarize: true
    summarize_after: 50
  project:
    path: "{{workspace}}/.llmos/MEMORY.md"
    auto_inject: true
    agent_writable: true
    max_lines: 200
  episodic:
    auto_record: true
    record_fields: [input, actions_taken, outcome, lessons]
    auto_recall:
      on_start: true
      query: "{{trigger.input}}"
      limit: 5
      min_similarity: 0.6
  procedural:
    learn_from_failures: true
    learn_from_successes: true
    auto_suggest: true

# ─── Perception ────────────────────────────────────────────────────

perception:
  enabled: false
  capture_after: true
  ocr_enabled: false
  timeout_seconds: 10
  actions:
    "browser.take_screenshot":
      capture_after: true
      ocr_enabled: true

# ─── Capabilities (fine-grained security) ──────────────────────────

capabilities:
  grant:
    - module: filesystem
      actions: [read_file, write_file, append_file, list_directory, search_files,
                get_file_info, create_directory, delete_file, move_file, copy_file,
                compute_checksum]
      constraints:
        paths: ["{{workspace}}"]
    - module: os_exec
      actions: [run_command, get_env_var, get_system_info]
    - module: memory
      actions: [store, recall, search, delete, list_keys,
                set_objective, get_context, update_progress, observe]
    - module: agent_spawn
      actions: [spawn_agent, check_agent, get_result, list_agents,
                cancel_agent, wait_agent, send_message]
    - module: context_manager
      actions: [get_budget, get_state, compress_history, get_tools_summary]
    - module: api_http
      actions: [http_get, http_post]
    - module: security
      actions: [check_permission, get_security_status]
    - module: module_manager
      actions: [list_modules, get_module_info, get_system_status]

  deny:
    - module: filesystem
      action: delete_file
      when: "{{params.path | endswith('.env') or params.path | endswith('.key') or params.path | endswith('.pem')}}"
      reason: "Cannot delete sensitive configuration or key files"
    - module: os_exec
      action: kill_process
      reason: "Process killing disabled for safety"
    - module: os_exec
      action: open_application
      reason: "Application launching disabled"
    - module: database
      action: insert_record
      reason: "Database is read-only"
    - module: database
      action: update_record
      reason: "Database is read-only"
    - module: database
      action: delete_record
      reason: "Database is read-only"

  approval_required:
    # Git push/reset operations
    - module: os_exec
      action: run_command
      when: "{{params.command | join(' ') | startswith('git push') or params.command | join(' ') | startswith('git reset')}}"
      message: "Approve git push/reset: {{params.command | join(' ')}}?"
      timeout: "120s"
      on_timeout: reject
      channel: cli
    # File deletion
    - module: filesystem
      action: delete_file
      message: "Approve file deletion: {{params.path}}?"
      timeout: "60s"
      on_timeout: reject
      channel: cli
    # Safety checkpoint after 100 actions
    - trigger: action_count
      threshold: 100
      message: "100 actions executed. Continue working?"
      timeout: "60s"
      on_timeout: approve

  audit:
    level: full
    log_params: true
    redact_secrets: true
    notify_on:
      - event: permission_denied
        channel: log
      - event: approval_timeout
        channel: log

# ─── Security ──────────────────────────────────────────────────────

security:
  profile: power_user
  sandbox:
    allowed_paths:
      - "{{workspace}}"
      - "/tmp/llmos-claude-code"
    blocked_commands:
      - "rm -rf /"
      - "dd if=/dev/zero"
      - "mkfs"
      - ":(){:|:&};:"

# ─── Macros ────────────────────────────────────────────────────────

macros:
  - name: read_and_lint
    description: "Read a file, run linter, report or auto-fix issues"
    params:
      path:
        type: string
        required: true
    body:
      - id: read_src
        action: filesystem.read_file
        params:
          path: "{{macro.path}}"
      - id: lint
        action: os_exec.run_command
        params:
          command: ["{{lint_command}}", "{{macro.path}}"]
        on_error: continue
      - id: check_lint
        branch:
          "on": "{{result.lint.exit_code}}"
          cases:
            "0":
              - id: lint_clean
                emit:
                  topic: "app.lint"
                  event:
                    path: "{{macro.path}}"
                    status: "clean"
          default:
            - id: fix_lint
              agent: coder
              input: |
                Lint errors in {{macro.path}}:
                {{result.lint.stderr}}

                File content:
                {{result.read_src}}

                Fix the lint issues with minimal changes.

  - name: run_tests
    description: "Execute test suite and analyze failures"
    params:
      test_path:
        type: string
        default: ""
    body:
      - id: exec_tests
        action: os_exec.run_command
        params:
          command: ["{{test_command}}", "{{macro.test_path}}", "-v", "--tb=short"]
        timeout: "{{test_timeout}}"
        on_error: continue
      - id: check_tests
        branch:
          "on": "{{result.exec_tests.exit_code}}"
          cases:
            "0":
              - id: tests_ok
                action: memory.store
                params:
                  key: "last_test_result"
                  value: "all_passed"
          default:
            - id: analyze
              agent: coder
              input: |
                Tests failed (exit code {{result.exec_tests.exit_code}}).

                Output:
                {{result.exec_tests.stdout}}

                Errors:
                {{result.exec_tests.stderr}}

                Analyze the failures. Identify root cause and suggest fixes.
            - id: store_failure
              action: memory.store
              params:
                key: "last_test_result"
                value: "failed:{{result.exec_tests.exit_code}}"

  - name: safe_shell
    description: "Run a shell command with retry and error diagnosis"
    params:
      cmd:
        type: string
        required: true
    body:
      - id: exec
        action: os_exec.run_command
        params:
          command: ["sh", "-c", "{{macro.cmd}}"]
        timeout: "{{shell_timeout}}"
        retry:
          max_attempts: 2
          backoff: fixed
        on_error: continue
      - id: check
        branch:
          "on": "{{result.exec.exit_code}}"
          cases:
            "0":
              - id: ok
                emit:
                  topic: "app.shell"
                  event:
                    command: "{{macro.cmd}}"
                    status: "success"
          default:
            - id: diagnose
              agent: coder
              input: |
                Command failed: {{macro.cmd}}
                Exit code: {{result.exec.exit_code}}
                Stdout: {{result.exec.stdout}}
                Stderr: {{result.exec.stderr}}

                Diagnose the issue and suggest a fix.

  - name: git_status
    description: "Get full git status including branch, diff, and recent commits"
    params: {}
    body:
      - id: status
        action: os_exec.run_command
        params:
          command: ["git", "status", "--short"]
        on_error: continue
      - id: branch
        action: os_exec.run_command
        params:
          command: ["git", "rev-parse", "--abbrev-ref", "HEAD"]
        on_error: continue
      - id: log
        action: os_exec.run_command
        params:
          command: ["git", "log", "--oneline", "-10"]
        on_error: continue

# ─── Triggers ──────────────────────────────────────────────────────

triggers:
  # ── Entry-point triggers (handled by CLI/API server) ──

  # Interactive conversation mode (default)
  - id: cli_conversation
    type: cli
    mode: conversation
    multiline: true
    history: true
    greeting: |
      Claude Code v7.0 — LLMOS Bridge
      Provider: {{env.LLMOS_PROVIDER ?? 'anthropic'}}
      Workspace: {{workspace}}

      Capabilities:
        Files: read, write, search, move, delete (workspace-sandboxed)
        Shell: run commands, git, npm, pytest, etc.
        Memory: 5-level persistent (project, episodic, procedural)
        Agents: spawn sub-agents for parallel work
        Context: auto-compression with summarization

      Type a coding task or question.

  # One-shot mode for scripts/CI
  - id: cli_oneshot
    type: cli
    mode: one_shot

  # HTTP API for CI/CD integrations
  - id: http_api
    type: http
    path: /code
    method: POST
    auth:
      type: bearer
    response:
      format: streaming_json

  # Webhook for GitHub events
  - id: github_webhook
    type: webhook
    path: /webhook/github
    method: POST
    auth:
      type: hmac
      secret: "{{env.GITHUB_WEBHOOK_SECRET}}"
    events: [push, pull_request]
    transform: "GitHub {{trigger.event}}: {{payload.repository.full_name}} — {{payload.head_commit.message}}"
    filters: ["{{payload.ref == 'refs/heads/main'}}"]

  # ── Background triggers (delegated to TriggerDaemon via AppTriggerBridge) ──

  # File watcher — auto-lint on save
  - id: file_watcher
    type: watch
    paths:
      - "{{workspace}}/src/**/*.py"
      - "{{workspace}}/lib/**/*.py"
    debounce: "3s"
    transform: "Files changed: {{input}}. Run linter and check for issues."
    filters: ["*.py"]

  # Scheduled daily code review
  - id: daily_review
    type: schedule
    cron: "0 9 * * 1-5"
    input: |
      Daily code review:
      1. Run: git log --oneline --since="yesterday"
      2. Review recent changes for issues
      3. Run the test suite
      4. Store findings in memory

  # Periodic health check
  - id: health_check
    type: schedule
    when: "every 30m"
    input: |
      Quick health check:
      1. module_manager.get_system_status()
      2. Check disk usage with os_exec.get_system_info("disk")
      3. Store status in memory

  # React to module installations
  - id: on_module_install
    type: event
    topic: "llmos.modules"
    transform: "Module event: {{payload}}"

  # React to security events
  - id: on_security_event
    type: event
    topic: "llmos.security"
    filters: ["{{payload.event_type == 'permission_denied'}}"]
    transform: "Security alert: {{payload.event_type}} — {{payload.details}}"

# ─── Observability ─────────────────────────────────────────────────

observability:
  streaming:
    enabled: true
    channels: [cli, sse]
    include_thoughts: true
    include_tool_calls: true
    include_results: false
  logging:
    level: info
    format: structured
    file: "{{workspace}}/.llmos/claude-code.log"
  tracing:
    enabled: true
    backend: opentelemetry
    sample_rate: 1.0
  metrics:
    - name: action_count
      type: counter
      track: "action.count"
    - name: action_duration
      type: histogram
      track: "action.duration_ms"
    - name: action_errors
      type: counter
      track: "action.error"
    - name: action_success
      type: counter
      track: "action.success"
    - name: tokens_used
      type: counter
      track: "action.tokens"

# ─── Module Configuration ──────────────────────────────────────────

module_config:
  database:
    connection_string: "sqlite:///{{workspace}}/.llmos/local.db"
    read_only: true
  browser:
    headless: true
    timeout: 30000
